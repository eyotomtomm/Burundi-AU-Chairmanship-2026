{% extends 'custom_admin/base.html' %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'custom_admin:about_features_list' %}" class="inline-flex items-center gap-1 text-sm text-on-surface-variant hover:text-on-surface transition-colors">
        <span class="material-symbols-outlined text-lg">arrow_back</span> Back to About Features
    </a>
</div>

<h1 class="text-2xl font-headline font-bold text-on-surface mb-6">
    {% if feature %}Edit Feature{% else %}Create Feature{% endif %}
</h1>

<form method="post" class="space-y-6">
    {% csrf_token %}
    <div class="bg-white rounded-xl border border-outline-variant p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-on-surface-variant mb-1">Title (English) *</label>
                <input type="text" name="title" value="{{ feature.title|default:'' }}" required
                    class="w-full rounded-lg border-outline-variant text-sm py-2.5 px-3 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-on-surface-variant mb-1">Title (French)</label>
                <input type="text" name="title_fr" value="{{ feature.title_fr|default:'' }}"
                    class="w-full rounded-lg border-outline-variant text-sm py-2.5 px-3 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-on-surface-variant mb-1">Icon *</label>
                <select name="icon_name" required
                    class="w-full rounded-lg border-outline-variant text-sm py-2.5 px-3 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                    {% for value, label in icon_choices %}
                    <option value="{{ value }}" {% if feature.icon_name == value %}selected{% endif %}>{{ value }} ({{ label }})</option>
                    {% endfor %}
                </select>
                <p class="text-xs text-on-surface-variant mt-1">Material Symbols icon name shown in the app.</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-on-surface-variant mb-1">Color</label>
                <select name="color"
                    class="w-full rounded-lg border-outline-variant text-sm py-2.5 px-3 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                    {% for value, label in color_choices %}
                    <option value="{{ value }}" {% if feature.color == value %}selected{% endif %}>{{ label }} ({{ value }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-on-surface-variant mb-1">Display Order</label>
                <input type="number" name="order" value="{{ feature.order|default:'0' }}"
                    class="w-full rounded-lg border-outline-variant text-sm py-2.5 px-3 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <div class="flex items-end">
                <label class="flex items-center gap-2 cursor-pointer pb-2">
                    <input type="checkbox" name="is_active" {% if feature.is_active or not feature %}checked{% endif %}
                        class="w-4 h-4 rounded border-outline-variant text-emerald-600 focus:ring-emerald-500">
                    <span class="text-sm font-medium text-on-surface">Active</span>
                </label>
            </div>
        </div>
    </div>

    <div class="flex items-center gap-4">
        <button type="submit" class="inline-flex items-center gap-2 bg-emerald-600 text-white font-medium rounded-lg py-3 px-8 hover:bg-emerald-700 transition-colors">
            <span class="material-symbols-outlined">save</span>
            {% if feature %}Update{% else %}Create{% endif %}
        </button>
        <a href="{% url 'custom_admin:about_features_list' %}" class="text-sm text-on-surface-variant hover:text-on-surface">Cancel</a>
    </div>
</form>
{% endblock %}
