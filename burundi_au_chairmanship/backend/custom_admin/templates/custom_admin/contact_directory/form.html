{% extends 'custom_admin/base.html' %}

{% block title %}{{ action }} Contact - Be 4 Africa Admin{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="flex items-center gap-4 mb-8">
    <a href="{% url 'custom_admin:contact_directory_list' %}" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
      <span class="material-symbols-outlined text-slate-600">arrow_back</span>
    </a>
    <h1 class="text-3xl font-bold text-slate-900 font-headline">{{ action }} Contact</h1>
  </div>

  <form method="post" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}
    <div class="bg-white rounded-xl shadow-sm p-8 border border-slate-100 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Name (EN) <span class="text-red-500">*</span></label>
          <input type="text" name="name" required value="{{ contact.name|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Name (FR)</label>
          <input type="text" name="name_fr" value="{{ contact.name_fr|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Title (EN)</label>
          <input type="text" name="title" value="{{ contact.title|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Title (FR)</label>
          <input type="text" name="title_fr" value="{{ contact.title_fr|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Department (EN)</label>
          <input type="text" name="department" value="{{ contact.department|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Department (FR)</label>
          <input type="text" name="department_fr" value="{{ contact.department_fr|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
          <input type="email" name="email" value="{{ contact.email|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Phone</label>
          <input type="tel" name="phone" value="{{ contact.phone|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Photo</label>
          <input type="file" name="photo" accept="image/*" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm">
          {% if contact.photo %}<p class="text-xs text-slate-500 mt-1">Current: {{ contact.photo.name }}</p>{% endif %}
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Display Order</label>
          <input type="number" name="display_order" value="{{ contact.display_order|default:0 }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>
      </div>
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="is_active" {% if contact.is_active or action == 'Create' %}checked{% endif %} class="rounded border-slate-300 text-cyan-600 focus:ring-cyan-500">
        <span class="text-sm text-slate-700">Active (visible in app)</span>
      </label>
    </div>
    <div class="flex gap-3">
      <a href="{% url 'custom_admin:contact_directory_list' %}" class="bg-white border border-slate-200 text-slate-700 font-semibold rounded-lg py-3 px-6 text-sm hover:bg-slate-50">Cancel</a>
      <button type="submit" class="bg-cyan-600 text-white font-semibold rounded-lg py-3 px-8 text-sm hover:bg-cyan-700 transition-all shadow-sm">{{ action }} Contact</button>
    </div>
  </form>
</div>
{% endblock %}
