{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Change Password | Diplomatic Portal 2026-2027</title>
<script>
(function() {
  var theme = localStorage.getItem('admin-theme');
  if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  }
})();
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface-container-low": "#f0f3ff",
        "outline-variant": "#c5c6cd",
        "outline": "#75777d",
        "primary": "#000000",
        "secondary": "#745b17",
        "primary-container": "#101c2e",
        "on-background": "#101c2e",
        "on-surface": "#101c2e",
        "surface": "#f9f9ff",
        "secondary-container": "#ffdc8c",
        "secondary-fixed": "#ffdf99",
        "secondary-fixed-dim": "#e5c374",
        "on-primary-container": "#79849b",
        "on-primary-fixed-variant": "#3c475b",
        "on-surface-variant": "#45474c",
        "surface-container-lowest": "#ffffff",
        "surface-container": "#e7eeff",
      },
      fontFamily: { "headline": ["Manrope"], "body": ["Inter"], "label": ["Inter"] },
    },
  },
}
</script>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.dark body.bg-surface { background-color: #0B1120 !important; color: #E5E7EB !important; }
.dark .bg-surface { background-color: #0B1120 !important; }
.dark .bg-surface-container-lowest { background-color: #111827 !important; }
.dark .bg-surface-container-low { background-color: #1F2937 !important; }
.dark .bg-surface-container { background-color: #1F2937 !important; }
.dark section.bg-primary-container { background-color: #0B1426 !important; }
.dark .text-on-surface { color: #F9FAFB !important; }
.dark .text-on-background { color: #E5E7EB !important; }
.dark .text-on-surface-variant { color: #9CA3AF !important; }
.dark .text-on-primary-container { color: #BBC7DF !important; }
.dark .text-on-primary-fixed-variant { color: #8899B5 !important; }
.dark .text-outline { color: #9CA3AF !important; }
.dark .text-secondary-fixed { color: #E5C374 !important; }
.dark .border-outline-variant { border-color: #374151 !important; }
.dark input::placeholder { color: #6B7280 !important; }
.dark input:not([type="checkbox"]):not([type="radio"]) { color: #F9FAFB !important; }
.dark button[type="submit"].bg-primary-container {
  background-color: #E5C374 !important;
  color: #0B1120 !important;
}
</style>
</head>
<body class="bg-surface font-body text-on-background min-h-screen flex items-center justify-center p-6">
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
  <div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-primary-fixed opacity-20 blur-[120px]"></div>
  <div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] rounded-full bg-secondary-fixed-dim opacity-10 blur-[100px]"></div>
</div>

<main class="relative z-10 w-full max-w-lg bg-surface-container-lowest rounded-xl shadow-xl p-10">
  <div class="text-center mb-8">
    <div class="w-16 h-16 rounded-2xl bg-surface-container-low flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-3xl text-secondary">lock_reset</span>
    </div>
    <h1 class="font-headline text-2xl font-bold text-on-surface mb-2">Change Your Password</h1>
    <p class="text-on-surface-variant text-sm">Your account requires a password change before you can continue.</p>
  </div>

  {% if messages %}
  {% for message in messages %}
  <div class="mb-4 p-3 rounded-lg text-sm {% if message.tags == 'error' %}bg-red-50 text-red-700 dark:bg-red-900/20 dark:text-red-400{% else %}bg-green-50 text-green-700 dark:bg-green-900/20 dark:text-green-400{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
  {% endif %}

  <form method="post" class="space-y-5">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-on-surface-variant mb-1" for="new_password">New Password</label>
      <input type="password" name="new_password" id="new_password" required minlength="10"
             class="w-full rounded-lg border border-outline-variant px-4 py-3 text-sm bg-transparent focus:ring-2 focus:ring-secondary focus:border-secondary"
             placeholder="Minimum 10 characters"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-on-surface-variant mb-1" for="confirm_password">Confirm Password</label>
      <input type="password" name="confirm_password" id="confirm_password" required minlength="10"
             class="w-full rounded-lg border border-outline-variant px-4 py-3 text-sm bg-transparent focus:ring-2 focus:ring-secondary focus:border-secondary"
             placeholder="Re-enter your new password"/>
    </div>
    <button type="submit" class="w-full bg-primary-container text-white font-semibold py-3 rounded-lg hover:opacity-90 transition">
      Set New Password
    </button>
  </form>
</main>
</body>
</html>
