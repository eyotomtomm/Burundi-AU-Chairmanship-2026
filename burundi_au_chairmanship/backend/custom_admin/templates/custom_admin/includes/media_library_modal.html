<!-- Media Library Modal — reusable via {% include %} -->
<!-- Usage: add a "Browse Media" button that calls openMediaLibrary('fieldName')
     where fieldName matches the hidden input name: existing_image_FIELDNAME -->

<div id="mediaLibraryModal" class="fixed inset-0 z-[9999] hidden">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeMediaLibrary()"></div>

  <!-- Modal -->
  <div class="absolute inset-4 md:inset-8 lg:inset-12 bg-surface-container-lowest rounded-2xl shadow-2xl flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant bg-surface-container">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-2xl text-primary">photo_library</span>
        <h2 class="text-xl font-headline font-bold text-on-surface">Media Library</h2>
      </div>
      <button onclick="closeMediaLibrary()"
              class="p-2 rounded-lg hover:bg-surface-container-high transition-colors">
        <span class="material-symbols-outlined text-on-surface-variant">close</span>
      </button>
    </div>

    <!-- Toolbar: folder tabs + search -->
    <div class="px-6 py-3 border-b border-outline-variant bg-surface-container flex flex-col sm:flex-row gap-3">
      <!-- Folder filter -->
      <div class="flex items-center gap-2 flex-1 overflow-x-auto" id="mlFolderTabs">
        <button type="button" onclick="mlFilterFolder('')"
                class="ml-folder-tab active px-3 py-1.5 rounded-full text-sm font-medium bg-primary-container text-white whitespace-nowrap transition-colors"
                data-folder="">
          All
        </button>
        <!-- Folder buttons populated by JS -->
      </div>
      <!-- Search -->
      <div class="relative min-w-[200px]">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">search</span>
        <input type="text"
               id="mlSearchInput"
               placeholder="Search files..."
               oninput="mlSearch(this.value)"
               class="w-full pl-10 pr-4 py-2 bg-surface-container-low border border-outline-variant rounded-lg text-sm text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary">
      </div>
    </div>

    <!-- Image grid -->
    <div class="flex-1 overflow-y-auto p-6" id="mlGridContainer">
      <!-- Loading state -->
      <div id="mlLoading" class="flex items-center justify-center h-full">
        <div class="text-center">
          <div class="inline-block w-8 h-8 border-4 border-primary-container border-t-transparent rounded-full animate-spin mb-3"></div>
          <p class="text-on-surface-variant text-sm">Loading media files...</p>
        </div>
      </div>
      <!-- Grid (populated by JS) -->
      <div id="mlGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 hidden"></div>
      <!-- Empty state -->
      <div id="mlEmpty" class="hidden flex items-center justify-center h-full">
        <div class="text-center">
          <span class="material-symbols-outlined text-5xl text-on-surface-variant mb-3">image_not_supported</span>
          <p class="text-on-surface-variant">No images found</p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-6 py-3 border-t border-outline-variant bg-surface-container flex items-center justify-between">
      <p class="text-sm text-on-surface-variant" id="mlImageCount">0 images</p>
      <button type="button" onclick="closeMediaLibrary()"
              class="px-5 py-2 rounded-lg bg-surface-container-high text-on-surface font-medium hover:bg-surface-container transition-colors">
        Cancel
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  // State
  let mlTargetField = '';
  let mlAllData = {};       // { folder: [{path, filename, url, size}] }
  let mlActiveFolder = '';
  let mlSearchQuery = '';
  let mlDataLoaded = false;

  // Open modal and fetch data
  window.openMediaLibrary = function(fieldName) {
    mlTargetField = fieldName;
    document.getElementById('mediaLibraryModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    if (!mlDataLoaded) {
      fetchMediaLibrary();
    } else {
      renderGrid();
    }
  };

  window.closeMediaLibrary = function() {
    document.getElementById('mediaLibraryModal').classList.add('hidden');
    document.body.style.overflow = '';
  };

  // Close on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && !document.getElementById('mediaLibraryModal').classList.contains('hidden')) {
      closeMediaLibrary();
    }
  });

  function fetchMediaLibrary() {
    document.getElementById('mlLoading').classList.remove('hidden');
    document.getElementById('mlGrid').classList.add('hidden');
    document.getElementById('mlEmpty').classList.add('hidden');

    fetch("{% url 'custom_admin:media_library_api' %}")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          console.error('Media library error:', data.error);
          document.getElementById('mlLoading').classList.add('hidden');
          document.getElementById('mlEmpty').classList.remove('hidden');
          return;
        }
        mlAllData = data.folders || {};
        mlDataLoaded = true;
        buildFolderTabs(data.folder_names || []);
        renderGrid();
      })
      .catch(function(err) {
        console.error('Media library fetch failed:', err);
        document.getElementById('mlLoading').classList.add('hidden');
        document.getElementById('mlEmpty').classList.remove('hidden');
      });
  }

  function buildFolderTabs(folderNames) {
    var container = document.getElementById('mlFolderTabs');
    // Keep the "All" button, remove the rest
    var allBtn = container.querySelector('[data-folder=""]');
    container.innerHTML = '';
    container.appendChild(allBtn);

    folderNames.forEach(function(name) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'ml-folder-tab px-3 py-1.5 rounded-full text-sm font-medium bg-surface-container-high text-on-surface-variant whitespace-nowrap transition-colors hover:bg-surface-container';
      btn.setAttribute('data-folder', name);
      btn.textContent = name.replace(/\//g, ' / ');
      btn.onclick = function() { mlFilterFolder(name); };
      container.appendChild(btn);
    });
  }

  window.mlFilterFolder = function(folder) {
    mlActiveFolder = folder;
    // Update tab styles
    document.querySelectorAll('.ml-folder-tab').forEach(function(tab) {
      if (tab.getAttribute('data-folder') === folder) {
        tab.className = 'ml-folder-tab active px-3 py-1.5 rounded-full text-sm font-medium bg-primary-container text-white whitespace-nowrap transition-colors';
      } else {
        tab.className = 'ml-folder-tab px-3 py-1.5 rounded-full text-sm font-medium bg-surface-container-high text-on-surface-variant whitespace-nowrap transition-colors hover:bg-surface-container';
      }
    });
    renderGrid();
  };

  window.mlSearch = function(query) {
    mlSearchQuery = query.toLowerCase();
    renderGrid();
  };

  function renderGrid() {
    document.getElementById('mlLoading').classList.add('hidden');
    var grid = document.getElementById('mlGrid');
    grid.innerHTML = '';

    var images = [];
    var folders = Object.keys(mlAllData);
    folders.forEach(function(folder) {
      if (mlActiveFolder && folder !== mlActiveFolder) return;
      mlAllData[folder].forEach(function(img) {
        if (mlSearchQuery && img.filename.toLowerCase().indexOf(mlSearchQuery) === -1) return;
        images.push(img);
      });
    });

    document.getElementById('mlImageCount').textContent = images.length + ' image' + (images.length !== 1 ? 's' : '');

    if (images.length === 0) {
      grid.classList.add('hidden');
      document.getElementById('mlEmpty').classList.remove('hidden');
      return;
    }

    document.getElementById('mlEmpty').classList.add('hidden');
    grid.classList.remove('hidden');

    images.forEach(function(img) {
      var card = document.createElement('div');
      card.className = 'group relative cursor-pointer rounded-xl overflow-hidden border-2 border-transparent hover:border-primary-container transition-all shadow-sm hover:shadow-md';
      card.onclick = function() { selectMediaImage(img); };
      card.innerHTML =
        '<div class="aspect-square bg-surface-container">' +
          '<img src="' + img.url + '" alt="' + img.filename + '" loading="lazy" ' +
               'class="w-full h-full object-cover transition-transform group-hover:scale-105">' +
        '</div>' +
        '<div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end">' +
          '<div class="p-2 w-full">' +
            '<p class="text-white text-xs font-medium truncate">' + img.filename + '</p>' +
            '<p class="text-white/70 text-xs">' + formatSize(img.size) + '</p>' +
          '</div>' +
        '</div>' +
        '<div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">' +
          '<span class="material-symbols-outlined text-white bg-primary-container rounded-full p-1 text-lg shadow-md">check_circle</span>' +
        '</div>';
      grid.appendChild(card);
    });
  }

  function selectMediaImage(img) {
    // Set the hidden input value
    var hiddenInput = document.getElementById('existing_image_' + mlTargetField);
    if (hiddenInput) {
      hiddenInput.value = img.path;
    }

    // Show preview
    var previewContainer = document.getElementById('ml_preview_' + mlTargetField);
    if (previewContainer) {
      previewContainer.innerHTML =
        '<div class="flex items-center gap-3 p-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg">' +
          '<img src="' + img.url + '" alt="' + img.filename + '" class="w-16 h-16 object-cover rounded-lg shadow-sm">' +
          '<div class="flex-1 min-w-0">' +
            '<p class="text-sm font-medium text-green-800 dark:text-green-200 truncate">' + img.filename + '</p>' +
            '<p class="text-xs text-green-600 dark:text-green-400">Selected from media library</p>' +
          '</div>' +
          '<button type="button" onclick="clearMediaSelection(\'' + mlTargetField + '\')" ' +
                  'class="p-1.5 rounded-lg hover:bg-green-100 dark:hover:bg-green-800 transition-colors">' +
            '<span class="material-symbols-outlined text-green-600 dark:text-green-400 text-lg">close</span>' +
          '</button>' +
        '</div>';
      previewContainer.classList.remove('hidden');
    }

    // Clear the file input so they don't conflict
    var fileInput = document.getElementById(mlTargetField);
    if (fileInput && fileInput.type === 'file') {
      fileInput.value = '';
    }

    closeMediaLibrary();
  }

  window.clearMediaSelection = function(fieldName) {
    var hiddenInput = document.getElementById('existing_image_' + fieldName);
    if (hiddenInput) hiddenInput.value = '';
    var previewContainer = document.getElementById('ml_preview_' + fieldName);
    if (previewContainer) {
      previewContainer.innerHTML = '';
      previewContainer.classList.add('hidden');
    }
  };

  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }
})();
</script>
