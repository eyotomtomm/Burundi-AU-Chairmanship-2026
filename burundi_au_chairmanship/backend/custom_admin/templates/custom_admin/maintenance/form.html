{% extends 'custom_admin/base.html' %}

{% block title %}{{ action }} Maintenance Window - AU Chairmanship Admin{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="flex items-center gap-4 mb-8">
    <a href="{% url 'custom_admin:maintenance_list' %}" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
      <span class="material-symbols-outlined text-slate-600">arrow_back</span>
    </a>
    <h1 class="text-3xl font-bold text-slate-900 font-headline">{{ action }} Maintenance Window</h1>
  </div>

  <form method="post" class="space-y-6">
    {% csrf_token %}
    <div class="bg-white rounded-xl shadow-sm p-8 border border-slate-100 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Title (EN) <span class="text-red-500">*</span></label>
          <input type="text" name="title" required value="{{ window.title|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-slate-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Title (FR)</label>
          <input type="text" name="title_fr" value="{{ window.title_fr|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-slate-500 focus:border-transparent">
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Description (EN)</label>
          <textarea name="description" rows="3" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-slate-500 focus:border-transparent">{{ window.description|default:'' }}</textarea>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Description (FR)</label>
          <textarea name="description_fr" rows="3" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-slate-500 focus:border-transparent">{{ window.description_fr|default:'' }}</textarea>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Starts At <span class="text-red-500">*</span></label>
          <input type="datetime-local" name="starts_at" required value="{{ window.starts_at|date:'Y-m-d\TH:i'|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-slate-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Ends At <span class="text-red-500">*</span></label>
          <input type="datetime-local" name="ends_at" required value="{{ window.ends_at|date:'Y-m-d\TH:i'|default:'' }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-slate-500 focus:border-transparent">
        </div>
      </div>
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="is_active" {% if window.is_active or action == 'Create' %}checked{% endif %} class="rounded border-slate-300 text-slate-600 focus:ring-slate-500">
        <span class="text-sm text-slate-700">Active (shows maintenance notice to users)</span>
      </label>
    </div>
    <div class="flex gap-3">
      <a href="{% url 'custom_admin:maintenance_list' %}" class="bg-white border border-slate-200 text-slate-700 font-semibold rounded-lg py-3 px-6 text-sm hover:bg-slate-50">Cancel</a>
      <button type="submit" class="bg-slate-700 text-white font-semibold rounded-lg py-3 px-8 text-sm hover:bg-slate-800 transition-all shadow-sm">{{ action }} Maintenance</button>
    </div>
  </form>
</div>
{% endblock %}
