{% extends 'custom_admin/base.html' %}

{% block title %}{{ action }} Phrase - Be 4 Africa Admin{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="flex items-center gap-4 mb-8">
    <a href="{% url 'custom_admin:phrasebook_list' %}" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
      <span class="material-symbols-outlined text-slate-600">arrow_back</span>
    </a>
    <h1 class="text-3xl font-bold text-slate-900 font-headline">{{ action }} Phrase</h1>
  </div>

  <form method="post" class="space-y-6">
    {% csrf_token %}
    <div class="bg-white rounded-xl shadow-sm p-8 border border-slate-100 space-y-6">

      <!-- Category & Order -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Category <span class="text-red-500">*</span></label>
          <select name="category" required class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
            {% for value, label in categories %}
            <option value="{{ value }}" {% if entry.category == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">
            Icon Name
            <span class="text-xs font-normal text-slate-500 ml-1">(auto-filled if blank)</span>
          </label>
          <input type="text" name="category_icon" value="{{ entry.category_icon|default:'' }}" placeholder="e.g. waving_hand" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Display Order</label>
          <input type="number" name="display_order" value="{{ entry.display_order|default:0 }}" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
      </div>

      <!-- Kirundi -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Kirundi <span class="text-red-500">*</span></label>
        <input type="text" name="kirundi" required maxlength="300" value="{{ entry.kirundi|default:'' }}" placeholder="e.g. Amahoro" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
      </div>

      <!-- English -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">English <span class="text-red-500">*</span></label>
        <input type="text" name="english" required maxlength="300" value="{{ entry.english|default:'' }}" placeholder="e.g. Hello / Peace" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
      </div>

      <!-- French -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Fran&ccedil;ais <span class="text-red-500">*</span></label>
        <input type="text" name="french" required maxlength="300" value="{{ entry.french|default:'' }}" placeholder="e.g. Bonjour / Paix" class="w-full border border-slate-200 bg-slate-50 rounded-lg py-2.5 px-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
      </div>

      <!-- Active toggle -->
      <div>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="is_active" {% if entry.is_active or action == 'Create' %}checked{% endif %} class="rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
          <span class="text-sm text-slate-700">Active (visible in the app)</span>
        </label>
      </div>
    </div>

    <!-- Submit -->
    <div class="flex gap-3">
      <a href="{% url 'custom_admin:phrasebook_list' %}" class="bg-white border border-slate-200 text-slate-700 font-semibold rounded-lg py-3 px-6 text-sm hover:bg-slate-50">Cancel</a>
      <button type="submit" class="bg-emerald-600 text-white font-semibold rounded-lg py-3 px-8 text-sm hover:bg-emerald-700 transition-all shadow-sm">{{ action }} Phrase</button>
    </div>
  </form>
</div>
{% endblock %}
