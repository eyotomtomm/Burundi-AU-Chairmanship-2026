name: burundi_au_chairmanship
description: Be 4 Africa Official App - Digital Magazine, Embassy Locations, Live Feeds, Resources, and Emergency SOS.
publish_to: 'none'
version: 1.2.5+34

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # UI Components
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0

  # URL Launcher
  url_launcher: ^6.3.1

  # Brand Icons
  font_awesome_flutter: ^10.7.0

  # Sharing
  share_plus: ^10.1.2
  in_app_review: ^2.0.9
  open_filex: ^4.5.0

  # Device Info
  device_info_plus: ^11.2.0

  # Image Picker
  image_picker: ^1.0.7
  file_picker: ^8.0.0

  # Screenshot & Screen Recording Prevention
  screen_protector: ^1.4.2

  # File Download & Storage
  path_provider: ^2.1.1
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  uuid: ^4.5.1

  # Utilities
  intl: ^0.20.2
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # Video Player for Live Feeds
  video_player: ^2.9.2
  chewie: ^1.8.5
  youtube_player_flutter: ^9.0.3
  webview_flutter: ^4.10.0

  # Calendar Integration
  add_2_calendar: ^3.0.1

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^28.2.7

  # Fonts
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  firebase_remote_config: ^5.1.0
  firebase_in_app_messaging: ^0.8.0+10

  # Deep Linking
  app_links: ^6.3.3

  # Social Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3

  # Local Notifications (for foreground push notifications)
  flutter_local_notifications: ^20.1.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # Error Tracking & Performance Monitoring
  sentry_flutter: ^8.3.0
  image_cropper: ^12.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#ffffff"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/youth_dialogue/
    - assets/icons/
    - assets/patterns/
    - assets/fonts/

  fonts:
    - family: HeatherGreen
      fonts:
        - asset: assets/fonts/HeatherGreen-Regular.ttf
