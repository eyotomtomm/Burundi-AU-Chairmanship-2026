name: burundi_au_chairmanship
description: Burundi Chairmanship Official App - Digital Magazine, Embassy Locations, Live Feeds, Resources, and Emergency SOS.
publish_to: 'none'
version: 1.1.1+13

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # UI Components
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0

  # URL Launcher
  url_launcher: ^6.3.1

  # Sharing
  share_plus: ^10.1.2
  in_app_review: ^2.0.9

  # Device Info
  device_info_plus: ^11.2.0

  # Image Picker
  image_picker: ^1.0.7

  # Screenshot & Screen Recording Prevention
  screen_protector: ^1.4.2

  # File Download & Storage
  path_provider: ^2.1.1
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.4

  # Utilities
  intl: ^0.20.2
  http: ^1.2.2

  # Video Player for Live Feeds
  video_player: ^2.9.2
  chewie: ^1.8.5
  youtube_player_flutter: ^9.0.3
  webview_flutter: ^4.10.0

  # Calendar Integration
  add_2_calendar: ^3.0.1

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^28.2.7

  # Fonts
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  firebase_remote_config: ^5.1.0

  # Social Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3

  # Local Notifications (for foreground push notifications)
  flutter_local_notifications: ^20.1.0

  # Error Tracking & Performance Monitoring
  sentry_flutter: ^8.3.0
  image_cropper: ^12.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/patterns/
    - assets/fonts/

  fonts:
    - family: HeatherGreen
      fonts:
        - asset: assets/fonts/HeatherGreen-Regular.ttf
